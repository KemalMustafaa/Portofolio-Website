<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
    <script
      src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1"
      type="module"
    ></script>
  </head>
  <body class="bg-black text-white">
    <header>
      <!-- nav -->
      <nav
        class="relative bg-black after:pointer-events-none after:absolute after:inset-x-0 after:bottom-0 after:h-px after:bg-white/10"
      >
        <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
          <div class="relative flex h-16 items-center justify-between">
            <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
              <!-- Mobile menu button-->
              <button
                type="button"
                command="--toggle"
                commandfor="mobile-menu"
                class="relative inline-flex items-center justify-center rounded-md p-2 text-gray-400 hover:bg-white/5 hover:text-white focus:outline-2 focus:-outline-offset-1 focus:outline-indigo-500"
              >
                <span class="absolute -inset-0.5"></span>
                <span class="sr-only">Open main menu</span>
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  data-slot="icon"
                  aria-hidden="true"
                  class="size-6 in-aria-expanded:hidden"
                >
                  <path
                    d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  data-slot="icon"
                  aria-hidden="true"
                  class="size-6 not-in-aria-expanded:hidden"
                >
                  <path
                    d="M6 18 18 6M6 6l12 12"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </button>
            </div>
            <div
              class="flex flex-1 items-center justify-center sm:items-center sm:justify-between"
            >
              <div
                class="flex shrink-0 items-center text-white font-bold text-xl"
              >
                Kemal
              </div>
              <div class="hidden sm:ml-6 sm:block">
                <div class="flex items-center">
                  <!-- Current: "bg-gray-950/50 text-white", Default: "text-gray-300 hover:bg-white/5 hover:text-white" -->
                  <a
                    href="#"
                    aria-current="page"
                    class="hover:border-b border-transparent hover:border-gray-500 px-3 py-2 text-sm font-medium text-white hover:bg-white/5 hover:text-white"
                    >Dashboard</a
                  >
                  <a
                    href="#"
                    class="hover:border-b border-transparent hover:border-gray-500 px-3 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white"
                    >Team</a
                  >
                  <a
                    href="#"
                    class="hover:border-b border-transparent hover:border-gray-500 px-3 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white"
                    >Projects</a
                  >
                  <a
                    href="#"
                    class="hover:border-b border-transparent hover:border-gray-500 px-3 py-2 text-sm font-medium text-gray-300 hover:bg-white/5 hover:text-white"
                    >Calendar</a
                  >
                </div>
              </div>
              <button
                class="hidden sm:ml-6 sm:flex items-center justify-center px-2 py-2 text-sm rounded-[3px] bg-gray-700 text-white hover:bg-gray-600 cursor-pointer"
              >
                Contact Me
              </button>
            </div>
          </div>
        </div>

        <el-disclosure
          id="mobile-menu"
          hidden
          class="block sm:hidden transition transition-discrete [--anchor-gap:--spacing(2)] data-closed:scale-95 data-closed:transform data-closed:opacity-0 data-enter:duration-100 data-enter:ease-out data-leave:duration-75 data-leave:ease-in"
        >
          <div class="space-y-1 px-2 pt-2 pb-3">
            <!-- Current: "bg-gray-950/50 text-white", Default: "text-gray-300 hover:bg-white/5 hover:text-white" -->
            <a
              href="#"
              aria-current="page"
              class="block border-b-2 border-gray-500 px-3 py-2 text-base font-medium text-white"
              >Dashboard</a
            >
            <a
              href="#"
              class="block px-3 py-2 text-base font-medium text-gray-300 hover:bg-white/5 hover:text-white"
              >Team</a
            >
            <a
              href="#"
              class="block px-3 py-2 text-base font-medium text-gray-300 hover:bg-white/5 hover:text-white"
              >Projects</a
            >
            <a
              href="#"
              class="block px-3 py-2 text-base font-medium text-gray-300 hover:bg-white/5 hover:text-white"
              >Calendar</a
            >
            <hr />
            <div
              class="rounded-[3px] text-center px-3 py-2 mt-3 bg-gray-700 text-white"
            >
              Contact Me
            </div>
          </div>
        </el-disclosure>
      </nav>

      <!-- Hero -->
      <section>
        <div class="location flex items-center justify-center">
          <img
            class="h-7 w-7"
            src="images/icons8-location-100.png"
            alt="location-icon"
          />
          <h5>Jakarta, Indonesia</h5>
        </div>
      </section>
    </header>
  </body>
</html>
